name: Fetch Typhoon Data

on:
  schedule:
    - cron: '0 * * * *' # 每小時自動執行
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch data from CWA
        run: |
          # 修正為 2026 最新官方開放資料圖資網址
          curl -s "https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0034-002?Authorization=${{ secrets.CWA_API_KEY }}&format=JSON" -o typhoon.json

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add typhoon.json
          git commit -m "自動更新颱風最新路徑資料" || exit 0
          git push
