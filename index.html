<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颱風動態即時視覺化觀測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style> #map { height: 600px; width: 100%; } </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="container mx-auto p-4 max-w-7xl">
        <header class="mb-6 text-center border-b pb-4">
            <h1 class="text-3xl font-extrabold text-indigo-700 tracking-wide">🌀 颱風動態即時視覺化</h1>
            <p class="text-sm text-gray-500 mt-2">資料來源：中央氣象署開放資料平臺 (自動每小時更新)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 h-[600px] overflow-y-auto">
                <h2 class="text-xl font-bold text-slate-700 mb-4 flex items-center gap-2">
                    📋 最新警報與消息
                </h2>
                <div id="typhoonInfo" class="space-y-4">
                    <div class="animate-pulse text-gray-400">正在載入最新颱風動態...</div>
                </div>
            </div>
            
            <div class="lg:col-span-2 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
                <div id="map" class="rounded-lg"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
