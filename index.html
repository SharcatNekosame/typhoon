<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時颱風動態走向圖</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0f172a; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-slate-900 border-b border-slate-800 p-4 text-center">
        <h1 class="text-2xl font-bold text-indigo-400 flex items-center justify-center gap-2">
            🌀 颱風動態即時視覺化
        </h1>
        <p class="text-xs text-slate-400 mt-1">資料來源：中央氣象署開放資料平台 (自動每小時更新)</p>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <section class="w-80 bg-slate-900 border-r border-slate-800 p-4 overflow-y-auto flex flex-col gap-4">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">📋 最新警報與消息</h2>
            <div id="typhoonInfo" class="space-y-4">
                <p class="text-slate-500 text-sm animate-pulse">正在連線至氣象署資料庫...</p>
            </div>
        </section>

        <section id="map" class="flex-1 h-full"></section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
